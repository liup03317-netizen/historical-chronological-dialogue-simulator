<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史的回音 — 编年体跨时代对话</title>
  <style>
    /* ============================================================
       全部样式内联，零CDN依赖
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #2A2A22;
      --bg-card: #3D3D2E;
      --bg-tooltip: #5A5A40;
      --text-primary: #f5f5f0;
      --text-accent: #A89060;
      --text-accent-dim: rgba(168, 144, 96, 0.4);
      --bg-user: #E5E5D8;
      --text-user: #2A2A22;
      --border-accent: rgba(168, 144, 96, 0.4);
    }

    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', 'Times New Roman', serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.7;
      overflow: hidden;
      height: 100vh;
    }

    /* 布局 */
    .app { display: flex; flex-direction: column; height: 100vh; }

    .header {
      flex-shrink: 0;
      border-bottom: 1px solid rgba(61,61,46,0.6);
      padding: 16px 24px;
      background: rgba(42,42,34,0.95);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 30;
    }
    .header-inner {
      max-width: 800px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #A89060, #6B5B45);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      color: var(--text-primary); font-size: 18px; font-weight: 700;
    }
    .header-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    .header-subtitle { font-size: 12px; color: rgba(168,144,96,0.8); }

    /* 对话区域 */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 32px 24px;
      scrollbar-width: thin; scrollbar-color: #5A5A40 #1E1E18;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: #1E1E18; }
    .chat-area::-webkit-scrollbar-thumb { background: #5A5A40; border-radius: 3px; }
    .chat-inner { max-width: 800px; margin: 0 auto; }

    /* 动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }

    @keyframes pulse-soft {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .pulse-soft { animation: pulse-soft 1.5s ease-in-out infinite; }

    @keyframes blink-cursor {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .cursor-blink { animation: pulse-soft 0.8s ease-in-out infinite; color: var(--text-accent); }

    /* 用户气泡 */
    .user-bubble {
      display: flex; align-items: flex-start; gap: 16px;
      margin-bottom: 32px; justify-content: flex-end;
    }
    .user-bubble .bubble-content {
      background: var(--bg-user); color: var(--text-user);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 20px; max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 15px; line-height: 1.7;
    }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #8B7355, #6B5B45);
      border: 2px solid var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .user-avatar svg { width: 100%; height: 100%; }

    /* 历史人物气泡 */
    .figure-bubble {
      display: flex; align-items: flex-start; gap: 16px;
      margin-bottom: 24px;
    }
    .figure-avatar-wrap {
      position: relative; flex-shrink: 0;
    }
    .figure-avatar-wrap:hover .tooltip-card {
      opacity: 1; visibility: visible;
    }
    .figure-avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-card);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      overflow: hidden; font-size: 18px; font-weight: 700;
      color: var(--text-accent);
    }
    .figure-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* 悬浮卡片 */
    .tooltip-card {
      position: absolute; left: 0; top: 100%; margin-top: 8px;
      width: 280px; padding: 20px;
      border-radius: 16px; background: var(--bg-tooltip);
      color: var(--text-primary);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 20; opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    @media (min-width: 768px) {
      .tooltip-card {
        left: 100%; top: -16px; margin-left: 24px; margin-top: 0;
      }
      .tooltip-card::before {
        position: absolute; left: -8px; top: 24px;
        width: 16px; height: 16px; background: var(--bg-tooltip);
        transform: rotate(45deg); content: '';
      }
    }
    @media (max-width: 767px) {
      .tooltip-card::before {
        position: absolute; top: -8px; left: 24px;
        width: 16px; height: 16px; background: var(--bg-tooltip);
        transform: rotate(45deg); content: '';
      }
    }
    .tooltip-card p { font-size: 14px; line-height: 1.7; position: relative; z-index: 1; }

    .figure-content { flex: 1; min-width: 0; }
    .figure-header {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px;
    }
    .figure-name { font-weight: 700; font-size: 18px; cursor: help; }
    .figure-era { font-size: 12px; color: var(--text-accent); letter-spacing: 1px; }
    .figure-text-bubble {
      background: var(--bg-card);
      border-radius: 16px 4px 16px 16px;
      padding: 12px 20px; max-width: 640px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 15px; line-height: 1.8;
    }

    /* 等待提示 */
    .loading-hint {
      display: flex; align-items: center; gap: 12px;
      color: var(--text-accent); margin-top: 16px;
    }
    .loading-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-accent);
    }

    /* 总结卡片 */
    .summary-card {
      margin-top: 24px; padding: 24px;
      border-radius: 16px; border: 1px solid var(--text-accent-dim);
      background: rgba(61,61,46,0.5);
    }
    .summary-title {
      font-size: 16px; font-weight: 700; color: var(--text-accent);
      margin-bottom: 16px; letter-spacing: 1px;
    }
    .summary-timeline {
      display: flex; flex-direction: column; gap: 8px;
    }
    .summary-item {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; padding: 6px 0;
    }
    .summary-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-accent); flex-shrink: 0;
    }
    .summary-line {
      width: 2px; height: 16px; background: var(--text-accent-dim);
      margin-left: 3px;
    }
    .summary-name { font-weight: 600; color: var(--text-accent); min-width: 80px; }
    .summary-era { color: var(--text-accent); font-size: 12px; min-width: 80px; }
    .summary-text { color: rgba(245,245,240,0.8); }


  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="header-icon">史</div>
        <div>
          <div class="header-title">历史的回音</div>
          <div class="header-subtitle">编年体跨时代对话模拟器</div>
        </div>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <!-- 动态插入内容 -->
      </div>
    </main>


  </div>

  <script>
    // ============================================================
    // 零依赖编年体对话渲染器 — 纯原生JS，无React/Babel/Tailwind
    // ============================================================

    // ====== 人物数据（由agent注入） ======
    const FIGURES_DATA = [
      {{FIGURES_PLACEHOLDER}}
    ];
    const USER_QUESTION = '{{QUESTION_PLACEHOLDER}}';

    // ====== 状态管理 ======
    let currentFigureIndex = 0;   // 当前正在显示的人物索引
    let currentCharIndex = 0;     // 当前人物的打字进度
    let isTyping = false;         // 是否正在打字
    let typewriterTimer = null;   // 打字机定时器
    let showSummary = false;      // 是否显示总结

    // ====== 百科全书元数据缓存 ======
    const metadataCache = {};

    // ============================================================
    // 1. 渐进式流解析器（供流式场景使用）
    // ============================================================
    function parseBuffer(buffer, isFinished) {
      const cleanBuffer = buffer.replace(/\|\|\|/g, '\n').replace(/---/g, '\n');
      const blocks = cleanBuffer.split(/(?=Name:\s*)/i).map(b => b.trim()).filter(b => b.length > 0);
      const figures = [];

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const nameMatch = block.match(/Name:\s*(.+)/i);
        const wikiMatch = block.match(/WikiTitle:\s*(.+)/i);
        const eraMatch = block.match(/Era:\s*(.+)/i);
        const textMatch = block.match(/Text:\s*([\s\S]*)/i);
        const isComplete = i < blocks.length - 1 || isFinished;

        if (nameMatch || eraMatch || textMatch) {
          let text = textMatch ? textMatch[1].trim() : '';
          if (!text) {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const textLines = lines.filter(l =>
              !l.toLowerCase().startsWith('name:') &&
              !l.toLowerCase().startsWith('era:') &&
              !l.toLowerCase().startsWith('wikititle:')
            );
            text = textLines.join('\n');
          }
          text = text.replace(/\|\|\|/g, '').trim();
          figures.push({
            name: nameMatch ? nameMatch[1].trim() : '',
            wikiTitle: wikiMatch ? wikiMatch[1].trim() : '',
            era: eraMatch ? eraMatch[1].trim() : '',
            text: text,
            isComplete
          });
        }
      }
      return figures;
    }

    // ============================================================
    // 2. 百科全书四级降级链路
    // ============================================================
    async function fetchFromWikipedia(wikiTitle) {
      if (!wikiTitle) return { avatar: null, bio: null };
      // Try Chinese Wikipedia first
      let result = await tryWikipedia('zh', wikiTitle, true);
      if (result.avatar || result.bio) return result;
      // Fallback to English Wikipedia
      result = await tryWikipedia('en', wikiTitle, false);
      return result;
    }

    async function tryWikipedia(lang, wikiTitle, useRedirects) {
      const url = 'https://' + lang + '.wikipedia.org/w/api.php?action=query&titles=' +
        encodeURIComponent(wikiTitle) +
        '&prop=pageimages|extracts&exsentences=2&exintro=true&explaintext=true&format=json&pithumbsize=200&origin=*' +
        (useRedirects ? '&redirects=1' : '');
      try {
        const r = await fetch(url);
        const data = await r.json();
        const pages = data.query && data.query.pages;
        if (pages) {
          const pageId = Object.keys(pages)[0];
          if (pageId !== '-1') {
            return {
              avatar: (pages[pageId].thumbnail && pages[pageId].thumbnail.source) || null,
              bio: pages[pageId].extract || null
            };
          }
        }
      } catch (e) { console.warn('Wikipedia (' + lang + ') fetch failed:', wikiTitle, e); }
      return { avatar: null, bio: null };
    }

    async function fetchFromBaiduBaike(chineseName) {
      if (!chineseName) return { avatar: null, bio: null };
      const url = 'https://baike.baidu.com/api/openapi/BaikeLemmaCardApi?scope=103&format=json&appid=379020&bk_key=' +
        encodeURIComponent(chineseName) + '&length=2';
      try {
        const r = await fetch(url);
        if (!r.ok) return { avatar: null, bio: null };
        const data = await r.json();
        if (data.lemmaId || data.title) {
          return { avatar: data.image || null, bio: data.abstract || null };
        }
      } catch (e) { console.warn('Baidu Baike fetch failed:', chineseName, e); }
      return { avatar: null, bio: null };
    }

    async function fetchFromSogouBaike(chineseName) {
      if (!chineseName) return { avatar: null, bio: null };
      const url = 'https://baike.sogou.com/api/openapi/lemma?title=' +
        encodeURIComponent(chineseName) + '&length=2';
      try {
        const r = await fetch(url);
        if (!r.ok) return { avatar: null, bio: null };
        const data = await r.json();
        if (data.lemmaId || data.title) {
          return {
            avatar: data.imageUrl || data.image || null,
            bio: data.abstract || data.description || null
          };
        }
      } catch (e) { console.warn('Sogou Baike fetch failed:', chineseName, e); }
      return { avatar: null, bio: null };
    }

    async function fetchFigureMetadata(wikiTitle, chineseName) {
      const cacheKey = wikiTitle || chineseName;
      if (!cacheKey) return { avatar: null, bio: null };
      if (metadataCache[cacheKey]) return metadataCache[cacheKey];

      let result = await fetchFromWikipedia(wikiTitle);
      if (result.avatar || result.bio) { metadataCache[cacheKey] = result; return result; }

      result = await fetchFromBaiduBaike(chineseName);
      if (result.avatar || result.bio) { metadataCache[cacheKey] = result; return result; }

      result = await fetchFromSogouBaike(chineseName);
      if (result.avatar || result.bio) { metadataCache[cacheKey] = result; return result; }

      const fallback = { avatar: null, bio: null };
      metadataCache[cacheKey] = fallback;
      return fallback;
    }

    // ============================================================
    // 3. DOM 操作工具
    // ============================================================
    function createElement(tag, className, innerHTML) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (innerHTML) el.innerHTML = innerHTML;
      return el;
    }

    function scrollToBottom() {
      const area = document.getElementById('chatArea');
      if (area) area.scrollTop = area.scrollHeight;
    }

    // ============================================================
    // 4. 渲染用户气泡
    // ============================================================
    function renderUserBubble(question) {
      const container = document.getElementById('chatInner');
      const bubble = createElement('div', 'user-bubble fade-in-up');
      bubble.innerHTML =
        '<div class="bubble-content">' + escapeHtml(question) + '</div>' +
        '<div class="user-avatar"><svg viewBox="0 0 48 48"><circle cx="24" cy="18" r="10" fill="#E5E5D8"/>' +
        '<circle cx="24" cy="50" r="18" fill="#E5E5D8"/></svg></div>';
      container.appendChild(bubble);
      scrollToBottom();
    }

    // ============================================================
    // 5. 渲染人物气泡（含头像、悬浮卡片、打字机文本）
    // ============================================================
    function renderFigureBubble(figure) {
      const container = document.getElementById('chatInner');
      const bubble = createElement('div', 'figure-bubble fade-in-up');
      bubble.id = 'figure-' + currentFigureIndex;

      const avatarWrap = createElement('div', 'figure-avatar-wrap');
      const avatar = createElement('div', 'figure-avatar');

      // 优先尝试百科头像，否则首字取母
      avatar.innerHTML = '<span class="avatar-letter">' + escapeHtml(figure.name ? figure.name[0] : '?') + '</span>';

      const tooltip = createElement('div', 'tooltip-card');
      tooltip.innerHTML = '<p>加载中...</p>';
      tooltip.style.display = 'none';

      avatarWrap.appendChild(avatar);
      avatarWrap.appendChild(tooltip);

      const content = createElement('div', 'figure-content');
      content.innerHTML =
        '<div class="figure-header">' +
          '<span class="figure-name">' + escapeHtml(figure.name) + '</span>' +
          '<span class="figure-era">' + escapeHtml(figure.era) + '</span>' +
        '</div>' +
        '<div class="figure-text-bubble">' +
          '<span id="typewriter-text-' + currentFigureIndex + '"></span>' +
          '<span id="typewriter-cursor-' + currentFigureIndex + '" class="cursor-blink">|</span>' +
        '</div>';

      bubble.appendChild(avatarWrap);
      bubble.appendChild(content);
      container.appendChild(bubble);
      scrollToBottom();

      // 异步获取百科元数据
      fetchFigureMetadata(figure.wikiTitle, figure.name).then(function(meta) {
        if (meta.avatar) {
          avatar.innerHTML = '<img src="' + escapeHtml(meta.avatar) + '" alt="' + escapeHtml(figure.name) +
            '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/>' +
            '<span class="avatar-letter" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">' +
            escapeHtml(figure.name ? figure.name[0] : '?') + '</span>';
        }
        if (meta.bio) {
          tooltip.innerHTML = '<p>' + escapeHtml(meta.bio) + '</p>';
          tooltip.style.display = '';
        } else {
          tooltip.style.display = 'none';
        }
      });

      // 启动打字机
      startTypewriter(figure.text, currentFigureIndex);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // ============================================================
    // 6. 打字机算法（拟真阅读节奏）
    // ============================================================
    function startTypewriter(text, figureIdx) {
      currentCharIndex = 0;
      isTyping = true;
      typeNextChar(text, figureIdx);
    }

    function typeNextChar(text, figureIdx) {
      if (currentCharIndex >= text.length) {
        // 打字完成
        const cursor = document.getElementById('typewriter-cursor-' + figureIdx);
        if (cursor) cursor.style.display = 'none';
        isTyping = false;

        // 链式驱动：延迟后添加下一位人物
        setTimeout(function() {
          currentFigureIndex++;
          if (currentFigureIndex < FIGURES_DATA.length) {
            renderFigureBubble(FIGURES_DATA[currentFigureIndex]);
          } else {
            renderSummary();
          }
        }, 600);
        return;
      }

      const char = text[currentCharIndex];
      const textEl = document.getElementById('typewriter-text-' + figureIdx);
      if (textEl) textEl.textContent += char;

      currentCharIndex++;
      scrollToBottom();

      // 拟真延时
      var delay = 85 + Math.random() * 45;
      if (['.', '!', '?', '。', '！', '？'].indexOf(char) !== -1) {
        delay = 500 + Math.random() * 400;
      } else if ([',', ';', '，', '；', ':', '：', '—', '-'].indexOf(char) !== -1) {
        delay = 280 + Math.random() * 170;
      }

      typewriterTimer = setTimeout(function() {
        typeNextChar(text, figureIdx);
      }, delay);
    }

    // ============================================================
    // 7. 总结卡片
    // ============================================================
    function renderSummary() {
      const container = document.getElementById('chatInner');
      const card = createElement('div', 'summary-card fade-in-up');
      let html = '<div class="summary-title">📜 编年体总结</div><div class="summary-timeline">';

      for (var i = 0; i < FIGURES_DATA.length; i++) {
        var f = FIGURES_DATA[i];
        if (i > 0) html += '<div class="summary-line"></div>';
        html += '<div class="summary-item">' +
          '<div class="summary-dot"></div>' +
          '<span class="summary-name">' + escapeHtml(f.name) + '</span>' +
          '<span class="summary-era">' + escapeHtml(f.era) + '</span>' +
          '<span class="summary-text">' + escapeHtml(f.text.substring(0, 30)) + '...</span>' +
        '</div>';
      }
      html += '</div>';
      card.innerHTML = html;
      container.appendChild(card);
      scrollToBottom();


    }

    // ============================================================
    // 8. 初始化
    // ============================================================
    function init() {
      if (USER_QUESTION && FIGURES_DATA.length > 0) {
        // 有预注入数据，直接渲染
        renderUserBubble(USER_QUESTION);
        // 短暂延迟后开始第一位人物
        setTimeout(function() {
          renderFigureBubble(FIGURES_DATA[0]);
        }, 800);
      } else {
        // 无预注入数据，显示欢迎提示
        const container = document.getElementById('chatInner');
        const hint = createElement('div', 'loading-hint pulse-soft');
        hint.innerHTML = '<div class="loading-dot"></div><span style="font-size:14px;">等待先贤入场...</span>';
        container.appendChild(hint);
      }
    }

    // 页面加载后启动
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
