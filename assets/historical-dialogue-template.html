<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史的回音 — 编年体跨时代对话</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      background-color: #2A2A22;
      color: #f5f5f0;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1E1E18; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #5A5A40; border-radius: 3px; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.5s ease-out forwards; }
    @keyframes pulse-soft {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .animate-pulse-soft { animation: pulse-soft 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ============================================================
    // 类型定义
    // ============================================================
    const HistoricalFigureResponse = {
      name: '', wikiTitle: '', era: '', text: '', isComplete: false
    };

    // ============================================================
    // 1. 渐进式流解析器
    // ============================================================
    function parseBuffer(buffer, isFinished) {
      const cleanBuffer = buffer.replace(/\|\|\|/g, '\n').replace(/---/g, '\n');
      const blocks = cleanBuffer.split(/(?=Name:\s*)/i).map(b => b.trim()).filter(b => b.length > 0);
      const figures = [];

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const nameMatch = block.match(/Name:\s*(.+)/i);
        const wikiMatch = block.match(/WikiTitle:\s*(.+)/i);
        const eraMatch = block.match(/Era:\s*(.+)/i);
        const textMatch = block.match(/Text:\s*([\s\S]*)/i);
        const isComplete = i < blocks.length - 1 || isFinished;

        if (nameMatch || eraMatch || textMatch) {
          let text = textMatch ? textMatch[1].trim() : '';
          if (!text) {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const textLines = lines.filter(l =>
              !l.toLowerCase().startsWith('name:') &&
              !l.toLowerCase().startsWith('era:') &&
              !l.toLowerCase().startsWith('wikititle:')
            );
            text = textLines.join('\n');
          }
          text = text.replace(/\|\|\|/g, '').trim();
          figures.push({
            name: nameMatch ? nameMatch[1].trim() : '',
            wikiTitle: wikiMatch ? wikiMatch[1].trim() : '',
            era: eraMatch ? eraMatch[1].trim() : '',
            text: text,
            isComplete
          });
        }
      }
      return figures;
    }

    // ============================================================
    // 2. 百科全书元数据获取（四级降级链路）
    // ============================================================
    const metadataCache = {};

    // --- 第一优先：维基百科 ---
    async function fetchFromWikipedia(wikiTitle) {
      if (!wikiTitle) return { avatar: null, bio: null };
      const url = `https://zh.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages|extracts&exsentences=2&exintro=true&explaintext=true&format=json&pithumbsize=200&origin=*&redirects=1`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        const pages = data.query?.pages;
        if (pages) {
          const pageId = Object.keys(pages)[0];
          if (pageId !== '-1') {
            return {
              avatar: pages[pageId].thumbnail?.source || null,
              bio: pages[pageId].extract || null
            };
          }
        }
      } catch (e) {
        console.warn('Wikipedia fetch failed:', wikiTitle, e);
      }
      return { avatar: null, bio: null };
    }

    // --- 第二优先：百度百科 ---
    async function fetchFromBaiduBaike(chineseName) {
      if (!chineseName) return { avatar: null, bio: null };
      const url = `https://baike.baidu.com/api/openapi/BaikeLemmaCardApi?scope=103&format=json&appid=379020&bk_key=${encodeURIComponent(chineseName)}&length=2`;
      try {
        const response = await fetch(url);
        if (!response.ok) return { avatar: null, bio: null };
        const data = await response.json();
        if (data.lemmaId || data.title) {
          return {
            avatar: data.image || null,
            bio: data.abstract || null
          };
        }
      } catch (e) {
        console.warn('Baidu Baike fetch failed:', chineseName, e);
      }
      return { avatar: null, bio: null };
    }

    // --- 第三优先：搜狗百科（快懂百科无公开API，跳过前端直接访问） ---
    async function fetchFromSogouBaike(chineseName) {
      if (!chineseName) return { avatar: null, bio: null };
      const url = `https://baike.sogou.com/api/openapi/lemma?title=${encodeURIComponent(chineseName)}&length=2`;
      try {
        const response = await fetch(url);
        if (!response.ok) return { avatar: null, bio: null };
        const data = await response.json();
        if (data.lemmaId || data.title) {
          return {
            avatar: data.imageUrl || data.image || null,
            bio: data.abstract || data.description || null
          };
        }
      } catch (e) {
        console.warn('Sogou Baike fetch failed:', chineseName, e);
      }
      return { avatar: null, bio: null };
    }

    // --- 统一降级函数 ---
    async function fetchFigureMetadata(wikiTitle, chineseName) {
      const cacheKey = wikiTitle || chineseName;
      if (!cacheKey) return { avatar: null, bio: null };
      if (metadataCache[cacheKey]) return metadataCache[cacheKey];

      // 第一优先：维基百科
      let result = await fetchFromWikipedia(wikiTitle);
      if (result.avatar || result.bio) {
        metadataCache[cacheKey] = result;
        return result;
      }

      // 第二优先：百度百科
      result = await fetchFromBaiduBaike(chineseName);
      if (result.avatar || result.bio) {
        metadataCache[cacheKey] = result;
        return result;
      }

      // 第三优先：搜狗百科
      // 注：快懂百科无公开 JSON API 且 CORS 受限，纯前端跳过
      result = await fetchFromSogouBaike(chineseName);
      if (result.avatar || result.bio) {
        metadataCache[cacheKey] = result;
        return result;
      }

      // 全部失败：首字取母头像
      const fallback = { avatar: null, bio: null };
      metadataCache[cacheKey] = fallback;
      return fallback;
    }

    // ============================================================
    // 3. 打字机组件
    // ============================================================
    function Typewriter({ figure, isActive, onComplete }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const timerRef = useRef(null);

      useEffect(() => {
        if (!isActive) return;

        if (currentIndex < figure.text.length) {
          const char = figure.text[currentIndex];
          let delay = 85 + Math.random() * 45;

          if (['.', '!', '?', '。', '！', '？'].includes(char)) {
            delay = 500 + Math.random() * 400;
          } else if ([',', ';', '，', '；', ':', '：', '—', '-'].includes(char)) {
            delay = 280 + Math.random() * 170;
          }

          timerRef.current = setTimeout(() => {
            setCurrentIndex(prev => prev + 1);
          }, delay);

          return () => {
            if (timerRef.current) clearTimeout(timerRef.current);
          };
        } else if (currentIndex >= figure.text.length && figure.isComplete && onComplete) {
          onComplete();
        }
      }, [figure.text, currentIndex, isActive, figure.isComplete]);

      // 当文本追加时（流式更新），不重置 currentIndex
      const displayText = figure.text.slice(0, currentIndex);
      const showCursor = isActive && currentIndex < figure.text.length;

      return (
        <span>
          {displayText}
          {showCursor && <span className="animate-pulse-soft text-[#A89060]">|</span>}
        </span>
      );
    }

    // ============================================================
    // 4. 头像组件
    // ============================================================
    function Avatar({ name, avatarUrl, isUser }) {
      if (isUser) {
        return (
          <div className="w-12 h-12 rounded-full flex-shrink-0 overflow-hidden border-2 border-[#A89060]/40 shadow-md"
               style={{ background: 'linear-gradient(135deg, #8B7355, #6B5B45)' }}>
            <svg viewBox="0 0 48 48" className="w-full h-full">
              <circle cx="24" cy="18" r="10" fill="#E5E5D8" />
              <circle cx="24" cy="50" r="18" fill="#E5E5D8" />
              <circle cx="20" cy="16" r="1.5" fill="#2A2A22" />
              <circle cx="28" cy="16" r="1.5" fill="#2A2A22" />
              <path d="M 20 22 Q 24 26 28 22" fill="none" stroke="#2A2A22" strokeWidth="1.5" />
            </svg>
          </div>
        );
      }

      if (avatarUrl) {
        return (
          <div className="w-12 h-12 rounded-full flex-shrink-0 overflow-hidden border-2 border-[#A89060]/40 shadow-md">
            <img src={avatarUrl} alt={name} className="w-full h-full object-cover"
                 onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
            <div className="w-full h-full items-center justify-center text-lg font-bold bg-[#3D3D2E] text-[#A89060] hidden"
                 style={{ display: 'none' }}>
              {name?.[0] || '?'}
            </div>
          </div>
        );
      }

      // Fallback: 首字取母头像
      return (
        <div className="w-12 h-12 rounded-full flex-shrink-0 overflow-hidden border-2 border-[#A89060]/40 shadow-md flex items-center justify-center bg-[#3D3D2E]">
          <span className="text-lg font-bold text-[#A89060]">{name?.[0] || '?'}</span>
        </div>
      );
    }

    // ============================================================
    // 5. 悬浮卡片组件
    // ============================================================
    function TooltipCard({ bio }) {
      if (!bio) return null;

      return (
        <div className="absolute left-0 top-full mt-2 md:left-full md:-top-4 md:ml-6 w-72 p-5 rounded-2xl bg-[#5A5A40] text-[#f5f5f0] shadow-xl z-20 opacity-0 invisible group-hover/tooltip:opacity-100 group-hover/tooltip:visible transition-all duration-300 pointer-events-none">
          <div className="absolute -top-2 left-6 md:-left-2 md:top-10 w-4 h-4 bg-[#5A5A40] rotate-45"></div>
          <p className="text-sm leading-relaxed relative z-10">{bio}</p>
        </div>
      );
    }

    // ============================================================
    // 6. 对话气泡组件
    // ============================================================
    function DialogueBubble({ figure, isActive, onComplete, isLast }) {
      const [metadata, setMetadata] = useState({ avatar: null, bio: null });
      const isComplete = !isActive;

      useEffect(() => {
        if (figure.wikiTitle) {
          fetchFigureMetadata(figure.wikiTitle, figure.name).then(setMetadata);
        }
      }, [figure.wikiTitle, figure.name]);

      return (
        <div className="animate-fadeInUp flex items-start gap-4 mb-6">
          <div className="relative group/tooltip flex-shrink-0">
            <Avatar name={figure.name} avatarUrl={metadata.avatar} isUser={false} />
            <TooltipCard bio={metadata.bio} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-baseline gap-3 mb-1">
              <span className="font-bold text-[#f5f5f0] text-lg group-hover/tooltip:cursor-help">
                {figure.name}
              </span>
              <span className="text-[#A89060] text-xs tracking-wider">{figure.era}</span>
            </div>
            <div className="bg-[#3D3D2E] rounded-2xl rounded-tl-sm px-5 py-3 max-w-2xl shadow-lg">
              <p className="text-[#f5f5f0] leading-relaxed text-[15px]">
                <Typewriter figure={figure} isActive={isActive} onComplete={onComplete} />
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // 7. 用户气泡组件
    // ============================================================
    function UserBubble({ question }) {
      return (
        <div className="animate-fadeInUp flex items-start gap-4 mb-8 justify-end">
          <div className="flex-1 min-w-0 flex justify-end">
            <div className="bg-[#E5E5D8] text-[#2A2A22] rounded-2xl rounded-tr-sm px-5 py-3 max-w-md shadow-lg">
              <p className="leading-relaxed text-[15px]">{question}</p>
            </div>
          </div>
          <Avatar name="师" isUser={true} />
        </div>
      );
    }

    // ============================================================
    // 8. 主应用组件
    // ============================================================
    function App() {
      const [question, setQuestion] = useState('');
      const [submittedQuestion, setSubmittedQuestion] = useState('');
      const [figures, setFigures] = useState([]);
      const [activeIndex, setActiveIndex] = useState(-1);
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState(null);
      const chatEndRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, []);

      useEffect(() => {
        scrollToBottom();
      }, [figures, activeIndex]);

      // ============================================================
      // 流式生成对话
      // ============================================================
      const handleSubmit = useCallback(async (e) => {
        e?.preventDefault();
        if (!question.trim()) return;

        const q = question.trim();
        setSubmittedQuestion(q);
        setQuestion('');
        setFigures([]);
        setActiveIndex(-1);
        setIsLoading(true);
        setError(null);

        const prompt = `You are a group of historical figures having a face-to-face conversation with the user and with each other. 
The user asks: "${q}"
Identify 5 to 8 key historical figures representing major turning points from the earliest times all the way up to the modern era, answering the question step by step. You MUST reach the modern/contemporary understanding by the end of the sequence.
Reply with their chronological answers. 
Make sure their language is colloquial, highly conversational, as if they are sitting in a room with the user, and strictly reflects their historical personas, quirks, and native speaking style.
IMPORTANT: ALL output (Name, Era, Text) MUST be in Simplified Chinese (简体中文).
They should respond to the user and sometimes nod, playfully argue, or reflect upon what the previous speaker just said.

FORMAT:
Separate each figure's response with exactly "|||" (three pipe characters) to avoid formatting conflicts.
For each figure, use this exact format:
Name: [Figure Name in Chinese]
WikiTitle: [Their exact, standard English Wikipedia page title, so we can fetch their portrait]
Era: [Era or Year in Chinese]
Text: [Their explanation/perspective in first person. Conversational tone. Keep it concise, around 3-6 sentences. MUST be in Chinese.]`;

        try {
          const GEMINI_API_KEY = typeof process !== 'undefined' && process.env?.GEMINI_API_KEY
            ? process.env.GEMINI_API_KEY
            : '';

          if (GEMINI_API_KEY) {
            // 使用 Gemini API 流式生成
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { temperature: 0.9, maxOutputTokens: 8192 }
                })
              }
            );

            if (!response.ok) {
              throw new Error(`API Error: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              const chunk = decoder.decode(value, { stream: true });
              // 解析 SSE 格式
              const lines = chunk.split('\n');
              for (const line of lines) {
                if (line.startsWith('data: ')) {
                  try {
                    const json = JSON.parse(line.slice(6));
                    const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    buffer += text;
                  } catch (e) {
                    // 忽略解析错误
                  }
                }
              }

              const parsed = parseBuffer(buffer, false);
              if (parsed.length > 0) {
                setFigures([...parsed]);
                if (activeIndex === -1) setActiveIndex(0);
              }
            }

            const finalFigures = parseBuffer(buffer, true);
            // 链式驱动：仅添加第一位，后续由 handleTypewriterComplete 驱动
            setFigures([finalFigures[0]]);
            setActiveIndex(0);
            // 将全部人物存入 ref
            allFiguresRef.current = finalFigures;
            setIsLoading(false);
          } else {
            // 无 API Key 时使用预设数据演示
            await simulateDemo(q);
          }
        } catch (err) {
          console.error('Generation error:', err);
          setError(err.message);
          setIsLoading(false);

          // 降级为演示模式
          await simulateDemo(q);
        }
      }, [question]);

      // ============================================================
      // 演示模式（链式驱动，逐步显示）
      // ============================================================
      const simulateDemo = async (q) => {
        const demoFigures = [
          {
            name: '德谟克利特',
            wikiTitle: 'Democritus',
            era: '约公元前460年',
            text: '朋友，你问了一个好问题！在我看来，世间万物——包括你手中的这块石头，甚至你的灵魂——都是由无数个不可分割的微小粒子组成的。我管它们叫"原子"，意思是"不可再分的东西"。这些原子在虚空中不断运动、碰撞、结合，就形成了我们看到的一切。',
            isComplete: true
          },
          {
            name: '约翰·道尔顿',
            wikiTitle: 'John Dalton',
            era: '1803年',
            text: '德谟克利特老前辈说得太对了，不过我得补充一些更精确的东西。通过研究气体的行为，我发现每种元素都有自己的"专属原子"——氢原子和氧原子是不一样的。而且，当它们化合时，总是按照固定的比例结合。这就是我的原子论：同种元素的原子质量相同，不同元素的原子质量不同。',
            isComplete: true
          },
          {
            name: '约瑟夫·约翰·汤姆孙',
            wikiTitle: 'J. J. Thomson',
            era: '1897年',
            text: '道尔顿先生，我不得不遗憾地告诉您——原子并非不可分割。我在阴极射线实验中发现了一种比原子更小的粒子，我称之为"电子"。它带负电，质量极小。这意味着原子内部还有结构！当然，我一开始以为原子像西瓜一样，电子像西瓜子一样嵌在里面。',
            isComplete: true
          },
          {
            name: '欧内斯特·卢瑟福',
            wikiTitle: 'Ernest Rutherford',
            era: '1911年',
            text: '汤姆孙的西瓜模型？哈！我用阿尔法粒子轰击金箔，结果大部分粒子穿过去了，但有极少数被弹了回来——就像用炮弹打棉絮，结果炮弹被弹回来一样！这说明原子内部有一个极小极密的原子核，电子在外面绕着转。原子的大部分空间其实是空的。',
            isComplete: true
          },
          {
            name: '尼尔斯·玻尔',
            wikiTitle: 'Niels Bohr',
            era: '1913年',
            text: '卢瑟福老师，您的核式模型有一个致命问题——按经典电动力学，电子绕核转动会辐射能量，最后掉进原子核里。显然这没有发生。我提出：电子只能在特定的轨道上运行，这些轨道是"量子化"的。电子从一个轨道跳到另一个轨道时，才会吸收或释放特定频率的光。',
            isComplete: true
          },
          {
            name: '埃尔温·薛定谔',
            wikiTitle: 'Erwin Schrödinger',
            era: '1926年',
            text: '玻尔模型很漂亮，但轨道这个概念太经典了。电子不是在轨道上运动的小球，而是一种波。我写了一个方程——后来人们管它叫薛定谔方程——来描述这种物质波。方程的解不是一条确定的轨道，而是一个"波函数"，它告诉你电子在某处出现的概率。原子里的电子更像一团云，而不是一颗行星。',
            isComplete: true
          }
        ];

        // 仅添加第一位，后续由 handleTypewriterComplete 链式驱动
        setFigures([demoFigures[0]]);
        setActiveIndex(0);
        // 将 demoFigures 存入 ref 供 handleTypewriterComplete 使用
        demoFiguresRef.current = demoFigures;
        setIsLoading(false);
      };

      const demoFiguresRef = useRef(null);

      const handleTypewriterComplete = useCallback(() => {
        // 链式驱动：当前人物打字完成后，添加下一位
        const demoFigures = demoFiguresRef.current;
        const allFigures = allFiguresRef.current;
        const sourceFigures = demoFigures || allFigures;
        const nextFigureIndex = figures.length;

        if (sourceFigures && nextFigureIndex < sourceFigures.length) {
          setTimeout(() => {
            if (sourceFigures) {
              setFigures(prev => [...prev, sourceFigures[nextFigureIndex]]);
            }
            setActiveIndex(nextFigureIndex);
          }, 600);
        }
      }, [figures.length]);

      const allFiguresRef = useRef(null);

      // ============================================================
      // 渲染
      // ============================================================
      return (
        <div className="min-h-screen flex flex-col">
          {/* 顶部标题栏 */}
          <header className="flex-shrink-0 border-b border-[#3D3D2E]/60 px-6 py-4 bg-[#2A2A22]/95 backdrop-blur-sm sticky top-0 z-30">
            <div className="max-w-4xl mx-auto flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#A89060] to-[#6B5B45] flex items-center justify-center shadow-lg">
                <span className="text-[#f5f5f0] text-lg">史</span>
              </div>
              <div>
                <h1 className="text-xl font-bold text-[#f5f5f0] tracking-wider">历史的回音</h1>
                <p className="text-xs text-[#A89060]/80">编年体跨时代对话模拟器</p>
              </div>
            </div>
          </header>

          {/* 对话区域 */}
          <main className="flex-1 overflow-y-auto px-6 py-8 scrollbar-thin">
            <div className="max-w-4xl mx-auto">
              {submittedQuestion && <UserBubble question={submittedQuestion} />}

              {figures.map((figure, index) => (
                <DialogueBubble
                  key={index}
                  figure={figure}
                  isActive={index === activeIndex}
                  onComplete={handleTypewriterComplete}
                  isLast={index === figures.length - 1}
                />
              ))}

              {isLoading && figures.length === 0 && (
                <div className="flex items-center gap-3 text-[#A89060] animate-pulse-soft">
                  <div className="w-2 h-2 bg-[#A89060] rounded-full"></div>
                  <span className="text-sm">跨越千年，召集先贤...</span>
                </div>
              )}

              <div ref={chatEndRef} />
            </div>
          </main>

          {/* 输入区域 */}
          <footer className="flex-shrink-0 border-t border-[#3D3D2E]/60 px-6 py-4 bg-[#2A2A22]/95 backdrop-blur-sm">
            <form onSubmit={handleSubmit} className="max-w-4xl mx-auto flex gap-3">
              <input
                type="text"
                value={question}
                onChange={(e) => setQuestion(e.target.value)}
                placeholder="提出你的问题，让跨越千年的先贤们来讨论..."
                className="flex-1 bg-[#3D3D2E] text-[#f5f5f0] rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-[#A89060]/50 placeholder-[#A89060]/40 text-[15px]"
                disabled={isLoading}
              />
              <button
                type="submit"
                disabled={isLoading || !question.trim()}
                className="px-6 py-3 bg-[#A89060] text-[#2A2A22] rounded-xl font-bold hover:bg-[#C0A870] transition-colors disabled:opacity-40 disabled:cursor-not-allowed text-[15px]"
              >
                叩问
              </button>
            </form>
            <p className="text-center text-[#A89060]/40 text-xs mt-2 max-w-4xl mx-auto">
              {typeof process !== 'undefined' && process.env?.GEMINI_API_KEY
                ? '由 Gemini 驱动 · 维基百科/百度百科/搜狗百科肖像与简介'
                : '演示模式 · 配置 GEMINI_API_KEY 解锁完整体验'}
            </p>
          </footer>
        </div>
      );
    }

    // ============================================================
    // 挂载
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
